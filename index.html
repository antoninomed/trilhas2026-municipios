<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trilhas 2026: Mapa de Alcance</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQv8D3ssdmxn0fR1iMrHqBz0F3lZwds="
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page-shell">
    <section class="dashboard-card" aria-labelledby="dashboard-title">
      <header class="dashboard-header">
        <div class="title-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="img">
            <path d="M12 2.25c-3.18 0-5.75 2.57-5.75 5.75 0 4.31 5.75 10.25 5.75 10.25S17.75 12.31 17.75 8c0-3.18-2.57-5.75-5.75-5.75Zm0 7.75a2 2 0 1 1 0-4 2 2 0 0 1 0 4Z"/>
            <path d="M5.2 19.1c1.62-.7 3.99-1.1 6.8-1.1s5.18.4 6.8 1.1c.95.41 1.45.92 1.45 1.4s-.5.99-1.45 1.4c-1.62.7-3.99 1.1-6.8 1.1s-5.18-.4-6.8-1.1c-.95-.41-1.45-.92-1.45-1.4s.5-.99 1.45-1.4Z" opacity=".28"/>
          </svg>
        </div>
        <div>
          <h1 id="dashboard-title">Trilhas 2026: Mapa de Alcance</h1>
          <p id="dashboard-status" class="dashboard-status" hidden></p>
        </div>
      </header>

      <div class="dashboard-grid">
        <section class="map-card" aria-label="Mapa de inscrições por município no Maranhão">
          <div id="map" class="map"></div>

          <div class="map-legend" aria-label="Legenda de Inscrições">
            <strong>Inscrições</strong>
            <div><span class="legend-dot danger"></span>80 ou mais</div>
            <div><span class="legend-dot warning"></span>30 a 79</div>
            <div><span class="legend-dot notice"></span>10 a 29</div>
            <div><span class="legend-dot success"></span>1 a 9</div>
          </div>
        </section>

        <aside class="table-card" aria-label="Tabela de inscrições por município">
          <div class="table-toolbar">
            <label class="search-box" for="city-search">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m20.7 19.3-4.2-4.2a7.55 7.55 0 1 0-1.4 1.4l4.2 4.2a1 1 0 0 0 1.4-1.4ZM5.5 10.5a5 5 0 1 1 10 0 5 5 0 0 1-10 0Z"/>
              </svg>
              <input id="city-search" type="search" placeholder="Buscar município..." autocomplete="off" />
            </label>

            <div class="view-mode-toggle" aria-label="Alternar visualização do dashboard">
              <button id="show-registered" type="button" class="mode-button active">
                Com inscrições
                <strong id="registered-count">0</strong>
              </button>
              <button id="show-missing" type="button" class="mode-button">
                Sem inscrições
                <strong id="missing-count">0</strong>
              </button>
            </div>


          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th class="rank-column" aria-label="Posição"></th>
                  <th>Município</th>
                  <th class="number-column">
                    <button id="sort-button" type="button" class="sort-button" aria-label="Ordenar inscrições">
                      Inscrições
                      <span id="sort-icon">⌄</span>
                    </button>
                  </th>
                </tr>
              </thead>
              <tbody id="city-table-body">
                <tr>
                  <td colspan="3" class="empty-state">Carregando dados...</td>
                </tr>
              </tbody>
            </table>
          </div>

          <footer class="table-footer">
            <p id="pagination-info">Mostrando 0 municípios</p>

            <div class="table-footer-actions">
              <div class="export-menu">
              <button id="export-toggle" type="button" class="export-button" aria-haspopup="menu" aria-expanded="false">
              <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3a1 1 0 0 1 1 1v9.59l3.3-3.3a1 1 0 0 1 1.4 1.42l-5 5a1 1 0 0 1-1.4 0l-5-5a1 1 0 1 1 1.4-1.42l3.3 3.3V4a1 1 0 0 1 1-1Z"/>
              <path d="M5 19a1 1 0 0 1 1-1h12a1 1 0 1 1 0 2H6a1 1 0 0 1-1-1Z"/>
              </svg>
              Exportar
              <span class="chevron"></span>
              </button>
              <div id="export-options" class="export-options" role="menu" hidden>
              <button type="button" data-export="csv" role="menuitem">Exportar CSV</button>
              <button type="button" data-export="json" role="menuitem">Exportar JSON</button>
              </div>
              </div>

              <nav class="pagination" aria-label="Paginação da tabela">
                <button id="prev-page" type="button" class="page-button" aria-label="Página anterior">‹</button>
                <div id="page-numbers" class="page-numbers"></div>
                <button id="next-page" type="button" class="page-button" aria-label="Próxima página">›</button>
              </nav>
            </div>
          </footer>
        </aside>
      </div>
    </section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="script.js"></script>
</body>
</html>
